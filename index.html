<style>
    body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Roboto', sans-serif; overflow: hidden; }

    /* PANTALLA DE INICIO (TELÓN) */
    #tap-to-start {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; display: flex; flex-direction: column;
        justify-content: center; align-items: center; cursor: pointer;
    }
    .logo-pre { width: 180px; border-radius: 20px; margin-bottom: 25px; opacity: 0.8; }
    .pulse-text { color: #c61a2e; font-size: 1rem; letter-spacing: 5px; animation: pulse 1.5s infinite; text-transform: uppercase; font-weight: 900; }
    @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(0.95); } }

    /* VIDEO CONFIGURADO (CONTAIN PARA ADAPTARSE, NO STRETCH) */
    #video-background, #video-mini {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain; /* Esto asegura que el video se adapte sin cortes */
        z-index: 1500;
        display: none;
        background: #000; /* Fondo negro por si el video es angosto */
    }

    /* CAPA FINAL (LOGO Y BOTÓN CENTRADOS) */
    #portada-sistema {
        display: flex;
        flex-direction: column;
        justify-content: center; /* Centrado vertical absoluto */
        align-items: center;     /* Centrado horizontal absoluto */
        height: 100vh;           /* Fuerza a ocupar toda la altura visible */
        width: 100%;
        background: transparent; /* Permite ver el video de fondo */
        position: relative;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.8s ease-in;
    }

    /* EL VIDEO DE FONDO AJUSTADO */
    #video-mini {
        display: none;
        object-fit: contain;
        z-index: 1; /* Detrás del logo y el botón */
        filter: brightness(0.4);
    }

    .logo-uerh {
        width: 250px;
        max-width: 80%; /* Asegura que no se salga en móviles angostos */
        border-radius: 20px;
        margin-bottom: 40px; /* Separación del botón */
        box-shadow: 0 0 30px rgba(198,26,46,0.5);
    }

    .btn-acceso {
        padding: 18px 60px;
        background: #c61a2e;
        color: white;
        text-decoration: none;
        border-radius: 50px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 3px;
        border: 3px solid #c61a2e;
        transition: 0.3s;
    }

    .btn-acceso:hover { background: white; color: #c61a2e; border-color: white; }

    /* ESTADO FINAL (MOSTRAR PORTADA CUANDO ESTÉ LISTA) */
    body.ready #portada-sistema { opacity: 1; }
    body.ready #video-mini { display: block; }
</style>

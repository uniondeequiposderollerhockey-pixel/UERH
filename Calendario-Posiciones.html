<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UERH - Sistema Integral</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --rojo: #c61a2e; --negro: #1a1a1a; --gris-f: #f4f4f4; --blanco: #ffffff; }
        body { font-family: 'Roboto', sans-serif; background: var(--gris-f); margin: 0; padding-bottom: 60px; }
        
        /* Navbar Global */
        .nav-uerh-global { background: #000; display: flex; align-items: center; position: sticky; top: 0; z-index: 10000; border-bottom: 3px solid var(--rojo); padding: 0 10px; height: 60px; overflow-x: auto; scrollbar-width: none; }
        .nav-uerh-global a, .nav-uerh-global .nav-item-btn { color: #888; text-decoration: none; padding: 0 15px; font-weight: 900; font-size: 0.7rem; text-transform: uppercase; border: none; background: none; cursor: pointer; display: flex; align-items: center; height: 100%; transition: 0.3s; white-space: nowrap; }
        .btn-nav-home { color: var(--rojo) !important; background: #1a1a1a !important; border-right: 1px solid #333 !important; }
        .nav-uerh-global .nav-item-btn.active { color: #fff !important; background: var(--rojo) !important; }

        .container { padding: 10px; max-width: 1000px; margin: 25px auto 0; }
        .section { display: none; }
        .section.active { display: block; }

        /* Acordeones */
        .grupo-contenedor { margin-bottom: 15px; }
        .grupo-header { background: #ddd; padding: 12px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; color: #333; }
        .grupo-contenido { display: block; margin-top: 10px; }
        .grupo-contenido.hidden { display: none; }
        .ronda-label { background: var(--negro); color: white; padding: 5px 12px; font-size: 0.65rem; border-radius: 4px; display: inline-block; margin-bottom: 10px; font-weight: bold; }

        /* Calendario Cards */
        .card { background: var(--blanco); border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; padding: 20px; border: 1px solid #eee; position: relative; }
        .sub-header { color: var(--rojo); font-size: 0.7rem; text-align: center; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        .score-display { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .team-block { flex: 1; text-align: center; }
        .logo-circle { width: 60px; height: 60px; border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; overflow: hidden; }
        .logo-circle img { width: 80%; height: 80%; object-fit: contain; }
        .team-name { font-weight: 900; font-size: 0.75rem; text-transform: uppercase; }

        .marcador-central { text-align: center; min-width: 110px; }
        .goles-num { font-size: 1.8rem; font-weight: 900; color: var(--negro); }
        .status-badge { font-size: 0.6rem; font-weight: 900; padding: 3px 7px; border-radius: 4px; text-transform: uppercase; display: inline-block; margin: 5px 0; }
        .status-finalizado { background: #e8f5e9; color: #2e7d32; }
        .status-programado { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
        .status-definir { background: #fff; color: #999; border: 1px dashed #ccc; }
        .match-info { font-size: 0.65rem; color: #666; font-weight: bold; text-transform: uppercase; }

        /* Tabla de Posiciones */
        .card-tabla { background: var(--blanco); border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow-x: auto; border: 1px solid #ddd; }
        .tabla-pos { width: 100%; border-collapse: collapse; text-align: center; min-width: 500px; }
        .tabla-pos thead { background: var(--negro); color: white; }
        .tabla-pos th { padding: 15px 10px; font-size: 0.75rem; text-transform: uppercase; }
        .tabla-pos td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .col-equipo { text-align: left !important; display: flex; align-items: center; gap: 10px; font-weight: 800; color: #000; }
        .mini-logo { width: 25px; height: 25px; object-fit: contain; }
        
        /* Columna PTS Roja Original */
        .pts-header { background: var(--rojo) !important; color: white !important; }
        .pts-badge { font-weight: 900; color: white; background: var(--rojo); font-size: 1.1rem; }
    </style>
</head>
<body>

<nav class="nav-uerh-global">
    <a href="UERH.html" class="btn-nav-home">INICIO</a>
    <button class="nav-item-btn active" id="btn-nav-cal" onclick="showTab('cal')">Calendario</button>
    <button class="nav-item-btn" id="btn-nav-pos" onclick="showTab('pos')">Posiciones</button>
    <a href="Equipos.html">Equipos</a>
    <a href="Estadisticasnuevo.html">Estadísticas</a>
</nav>

<div class="container">
    <div id="cal" class="section active">
        <div id="menu-fases">
            <div onclick="verFase('regular')" class="card" style="cursor:pointer"><h3>Temporada Regular</h3><p>3 Rondas</p></div>
            <div onclick="verFase('playoffs')" class="card" style="cursor:pointer"><h3>Playoffs (BO3)</h3></div>
            <div onclick="verFase('final')" class="card" style="cursor:pointer"><h3>Gran Final</h3></div>
        </div>
        <div id="vista-partidos" style="display:none;">
            <button class="btn-nav-home" style="padding:10px; border-radius:8px; cursor:pointer; margin-bottom:15px;" onclick="volverAlMenu()">← VOLVER AL MENÚ</button>
            <div id="render-partidos-fase"></div>
        </div>
    </div>

    <div id="pos" class="section">
        <div class="card-tabla">
            <table class="tabla-pos">
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align:left;">EQUIPO</th>
                        <th>PJ</th><th>PG</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th>
                        <th class="pts-header">PTS</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let DATA = {};
    let faseActiva = null;

    db.ref('config').on('value', snap => {
        DATA = snap.val() || {};
        procesarTabla(DATA.resultados || {}, DATA.logos || {});
        if(faseActiva) verFase(faseActiva);
    });

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-nav-cal').classList.toggle('active', id === 'cal');
        document.getElementById('btn-nav-pos').classList.toggle('active', id === 'pos');
    }

    function toggleGrupo(id) { document.getElementById(id).classList.toggle('hidden'); }

    function verFase(key) {
        faseActiva = key;
        const fase = ESTRUCTURA_FASES[key], res = DATA.resultados || {}, logos = DATA.logos || {};
        document.getElementById('menu-fases').style.display = 'none';
        document.getElementById('vista-partidos').style.display = 'block';
        
        let jugados = [], proximos = [];
        fase.ids.forEach(id => {
            const d = res[id];
            const finalizado = (parseInt(d?.equipos?.local?.puntos) || 0) + (parseInt(d?.equipos?.visitante?.puntos) || 0) > 0;
            const tarjeta = generarTarjeta(id, d, logos, finalizado);
            if (finalizado) jugados.push(tarjeta); else proximos.push(tarjeta);
        });

        document.getElementById('render-partidos-fase').innerHTML = `
            <div class="grupo-contenedor">
                <div class="grupo-header" onclick="toggleGrupo('cont-prox')"><span>Próximos Partidos (${proximos.length})</span><span>▼</span></div>
                <div id="cont-prox" class="grupo-contenido">${proximos.join("")}</div>
            </div>
            <div class="grupo-contenedor">
                <div class="grupo-header" onclick="toggleGrupo('cont-jug')"><span>Partidos Jugados (${jugados.length})</span><span>▼</span></div>
                <div id="cont-jug" class="grupo-contenido">${jugados.reverse().join("")}</div>
            </div>`;
    }

    function generarTarjeta(id, d, logos, finalizado) {
        const locN = d?.equipos?.local?.nombre || "TBD", visN = d?.equipos?.visitante?.nombre || "TBD";
        const fecha = d?.fecha && d.fecha.trim() !== "" ? d.fecha : null;
        let rondaHtml = id.includes('ronda') ? `<div class="ronda-label">Ronda ${id.split('-')[0].replace('ronda','')}</div>` : "";
        let status = finalizado ? `<div class="status-badge status-finalizado">Finalizado</div>` : 
                     (fecha ? `<div class="status-badge status-programado">Programado</div>` : `<div class="status-badge status-definir">Por definir</div>`);

        return `
        <div class="card" style="border-left: 5px solid ${finalizado ? '#ccc' : '#333'}">
            ${rondaHtml}<div class="sub-header">${id.replace(/-/g, ' ').toUpperCase()}</div>
            <div class="score-display">
                <div class="team-block"><div class="logo-circle"><img src="${logos[locN]||''}"></div><div class="team-name">${locN}</div></div>
                <div class="marcador-central">
                    <div style="display:flex; justify-content:center; align-items:center; gap:8px;">
                        <span class="goles-num">${d?.equipos?.local?.goles || 0}</span><span style="color:#ccc;">:</span><span class="goles-num">${d?.equipos?.visitante?.goles || 0}</span>
                    </div>
                    ${status}<div class="match-info"><div>${d?.sede || 'TBD'}</div><div style="color:var(--rojo)">${fecha || 'POR DEFINIR'} ${d?.hora || ''}</div></div>
                </div>
                <div class="team-block"><div class="logo-circle"><img src="${logos[visN]||''}"></div><div class="team-name">${visN}</div></div>
            </div>
        </div>`;
    }

    function volverAlMenu() { faseActiva = null; document.getElementById('menu-fases').style.display = 'block'; document.getElementById('vista-partidos').style.display = 'none'; }

    function procesarTabla(resultados, logos) {
        let tabla = {};
        Object.keys(logos).forEach(n => tabla[n] = { n, pj:0, pg:0, pp:0, gf:0, gc:0, pts:0 });
        Object.values(resultados).forEach(p => {
            const l = p.equipos?.local, v = p.equipos?.visitante;
            if (l && v && tabla[l.nombre] && (parseInt(l.puntos) + parseInt(v.puntos) > 0)) {
                const gL = parseInt(l.goles) || 0, gV = parseInt(v.goles) || 0;
                tabla[l.nombre].pj++; tabla[v.nombre].pj++;
                tabla[l.nombre].gf += gL; tabla[l.nombre].gc += gV;
                tabla[v.nombre].gf += gV; tabla[v.nombre].gc += gL;
                tabla[l.nombre].pts += parseInt(l.puntos); tabla[v.nombre].pts += parseInt(v.puntos);
                if(gL > gV) { tabla[l.nombre].pg++; tabla[v.nombre].pp++; }
                else { tabla[v.nombre].pg++; tabla[l.nombre].pp++; }
            }
        });
        const rank = Object.values(tabla).sort((a,b) => b.pts - a.pts || (b.gf-b.gc) - (a.gf-a.gc));
        let h = "";
        rank.forEach((eq, i) => {
            const dg = eq.gf - eq.gc;
            h += `<tr><td>${i+1}</td><td class="col-equipo"><img src="${logos[eq.n]}" class="mini-logo">${eq.n}</td>
            <td>${eq.pj}</td><td>${eq.pg}</td><td>${eq.pp}</td><td>${eq.gf}</td><td>${eq.gc}</td>
            <td style="color:${dg>0?'green':(dg<0?'red':'black')}">${dg>0?'+'+dg:dg}</td><td class="pts-badge">${eq.pts}</td></tr>`;
        });
        document.getElementById('cuerpo-tabla').innerHTML = h;
    }

    const ESTRUCTURA_FASES = {
        regular: { ids: ['ronda1-fecha1A', 'ronda1-fecha1B', 'ronda1-fecha2A', 'ronda1-fecha2B', 'ronda1-fecha3A', 'ronda1-fecha3B', 'ronda2-fecha1A', 'ronda2-fecha1B', 'ronda2-fecha2A', 'ronda2-fecha2B', 'ronda2-fecha3A', 'ronda2-fecha3B', 'ronda3-fecha1A', 'ronda3-fecha1B', 'ronda3-fecha2A', 'ronda3-fecha2B', 'ronda3-fecha3A', 'ronda3-fecha3B'] },
        playoffs: { ids: ['juego1-semifinalA', 'juego1-semifinalB', 'juego2-semifinalA', 'juego2-semifinalB', 'juego3-semifinalA', 'juego3-semifinalB'] },
        final: { ids: ['juego1-3puesto', 'juego1-granfinal', 'juego2-3puesto', 'juego2-granfinal', 'juego3-3puesto', 'juego3-granfinal'] }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UERH - Sistema Integral</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --rojo: #c61a2e; --negro: #1a1a1a; --gris-f: #f4f4f4; --blanco: #ffffff; --azul: #2196F3; }
        body { font-family: 'Roboto', sans-serif; background: var(--gris-f); margin: 0; padding-bottom: 60px; }
        
        .navbar { background: var(--negro); color: white; display: flex; overflow-x: auto; position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 15px; white-space: nowrap; cursor: pointer; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; border-bottom: 3px solid transparent; flex: 1; text-align: center; }
        .nav-item.active { border-bottom: 3px solid var(--rojo); color: var(--rojo); }

        .container { padding: 10px; max-width: 1000px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }

        /* Calendario */
        .menu-fases { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .fase-card-btn { background: var(--blanco); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; cursor: pointer; text-align: left; transition: 0.2s; }
        .fase-card-btn:active { transform: scale(0.98); }
        #vista-partidos { display: none; }
        .btn-volver { background: var(--negro); color: white; border: none; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        
        .card { background: var(--blanco); border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; padding: 20px; border: 1px solid #eee; }
        .sub-header { color: var(--rojo); font-size: 0.75rem; text-align: center; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }
        
        .game-meta { text-align: center; margin-bottom: 20px; }
        .meta-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .input-pill { border: 1px solid #ddd; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; text-align: center; width: 100px; background: white; }
        .input-sede { display: block; width: 100%; border: none; background: transparent; text-align: center; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; }
        
        .score-display { display: flex; justify-content: space-between; align-items: flex-start; margin: 15px 0; gap: 10px; }
        .team-block { flex: 1; text-align: center; max-width: 38%; }
        .logo-circle { width: 75px; height: 75px; border-radius: 50%; background: #fff; box-shadow: 0 3px 8px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; overflow: hidden; border: 1px solid #f0f0f0; }
        .logo-circle img { width: 80%; height: 80%; object-fit: contain; }
        
        .select-equipo { width: 100%; border: 1px solid #ddd; border-radius: 6px; font-size: 0.8rem; font-weight: bold; color: #333; padding: 6px; background: #fff; }
        .marcador-area { display: flex; align-items: center; gap: 8px; padding-top: 15px; }
        .input-goles { width: 50px; height: 50px; text-align: center; border: 1px solid #eee; border-radius: 12px; font-size: 1.6rem; font-weight: bold; background: #f9f9f9; color: black; }
        .btn-update { width: 100%; background: var(--azul); color: white; border: none; padding: 14px; border-radius: 10px; margin-top: 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        /* Estilos integrados de TABLA.html */
        .card-tabla { background: var(--blanco); border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; margin: auto; }
        .tabla-pos { width: 100%; border-collapse: collapse; text-align: center; }
        .tabla-pos thead { background: var(--negro); color: white; }
        .tabla-pos th { padding: 15px; font-size: 0.85rem; text-transform: uppercase; }
        .tabla-pos td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 1rem; }
        .col-equipo { text-align: left; display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .mini-logo { width: 30px; height: 30px; object-fit: contain; }
        .pts-badge { font-weight: 900; color: var(--rojo); font-size: 1.1rem; background: rgba(198, 26, 46, 0.1); }
    </style>
</head>
<body>

<style>
    /* 1. BARRA DE NAVEGACIÓN EN UNA SOLA LÍNEA */
    .nav-uerh-global {
        background: #000;
        display: flex;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 10000;
        border-bottom: 3px solid #c61a2e;
        padding: 0 10px;
        height: 60px;
        overflow-x: auto;
        scrollbar-width: none;
    }
    .nav-uerh-global::-webkit-scrollbar { display: none; }

    /* Estilo para enlaces y botones del menú */
    .nav-uerh-global a, .nav-uerh-global .nav-item-btn {
        color: #888;
        text-decoration: none;
        padding: 0 15px;
        font-weight: 900;
        font-size: 0.7rem;
        text-transform: uppercase;
        border: none;
        background: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        height: 100%;
        transition: 0.3s;
        white-space: nowrap;
    }

    /* Botón de Inicio */
    .btn-nav-home { 
        color: #c61a2e !important; 
        background: #1a1a1a !important; 
        border-right: 1px solid #333 !important; 
    }

    /* Estado activo para Calendario/Posiciones */
    .nav-uerh-global .nav-item-btn.active { 
        color: #fff !important; 
        background: #c61a2e !important; 
    }

    .divider-nav {
        width: 1px;
        height: 30px;
        background: #444;
        margin: 0 10px;
        flex-shrink: 0;
    }

    /* 2. AJUSTE PARA QUE EL CONTENIDO NO SE CORTE */
    .container {
        margin-top: 25px !important; 
    }
</style>

<nav class="nav-uerh-global">

    <a href="UERH.html" class="btn-nav-home">INICIO</a>

    <button class="nav-item-btn active" id="btn-nav-cal" onclick="showTab('cal')">Calendario</button>
    <button class="nav-item-btn" id="btn-nav-pos" onclick="showTab('pos')">Posiciones</button>

    
    <a href="Equipos.html">Equipos</a>
    <a href="Estadisticasnuevo.html">Estadísticas</a>
    <a href="Porteros.html">Ranking Goleros</a>
    
    <div class="divider-nav"></div>

    
</nav>

<div class="container">
    <div id="cal" class="section active">
        <div id="menu-fases" class="menu-fases">
            <div class="fase-card-btn" onclick="verFase('regular')">
                <h3>Temporada Regular</h3>
                <p>3 Rondas</p>
            </div>
            <div class="fase-card-btn" onclick="verFase('playoffs')">
                <h3>Playoffs (Best of 3)</h3>
                <p>Juegos 1, 2 y 3</p>
            </div>
            <div class="fase-card-btn" onclick="verFase('final')">
                <h3>Gran Final</h3>
                <p>Final y 3er Puesto</p>
            </div>
        </div>
        <div id="vista-partidos">
            <button class="btn-volver" onclick="volverAlMenu()">← VOLVER AL MENÚ</button>
            <div id="render-partidos-fase"></div>
        </div>
    </div>
    
    <div id="pos" class="section">
        <div class="card-tabla">
            <table class="tabla-pos">
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align:left;">Equipo</th>
                        <th>PJ</th><th>PG</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th>
                        <th style="background:#c61a2e">PTS</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Asegúrate de actualizar tu función showTab para que los botones cambien de color
    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        
        // Quitar estado activo de los botones del banner
        document.getElementById('btn-nav-cal').classList.remove('active');
        document.getElementById('btn-nav-pos').classList.remove('active');

        const targetSection = document.getElementById(id);
        if (targetSection) targetSection.classList.add('active');

        // Activar el botón correspondiente
        if(id === 'cal') document.getElementById('btn-nav-cal').classList.add('active');
        if(id === 'pos') document.getElementById('btn-nav-pos').classList.add('active');

        if (id !== 'cal') volverAlMenu();
    }
</script>
    <script>
        const firebaseConfig = { databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let DATA = {};
        let faseActiva = null;
        const esAdmin = window.parent && window.parent.esAdmin === true;

        if (esAdmin) {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML += `
                <div class="nav-item" onclick="showTab('pla')">Plantillas</div>
                <div class="nav-item" onclick="showTab('est')">Estadísticas</div>
                <div class="nav-item" onclick="showTab('san')">Sanciones</div>
            `;
        }

        db.ref().on('value', snap => {
            DATA = snap.val() || {};
            if(faseActiva) verFase(faseActiva);
            // Ahora llama al nuevo motor de TABLA.html
            procesarTabla(DATA.config?.resultados || {}, DATA.config?.logos || {});
        });

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const targetSection = document.getElementById(id);
            if (targetSection) targetSection.classList.add('active');
            event.currentTarget.classList.add('active');
            if (id !== 'cal') volverAlMenu();
        }

        // MOTOR INTEGRADO DE TABLA.HTML (Sustituye a renderPosiciones)
        function procesarTabla(resultados, logos) {
            let tabla = {};
            Object.keys(logos).forEach(nombre => {
                tabla[nombre] = { nombre, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, pts: 0 };
            });

            Object.values(resultados).forEach(partido => {
                if (partido.equipos?.local && partido.equipos?.visitante) {
                    const loc = partido.equipos.local;
                    const vis = partido.equipos.visitante;

                    if (tabla[loc.nombre] && tabla[vis.nombre]) {
                        const golesL = parseInt(loc.goles) || 0;
                        const golesV = parseInt(vis.goles) || 0;
                        const ptsL = parseInt(loc.puntos) || 0;
                        const ptsV = parseInt(vis.puntos) || 0;

                        if (ptsL > 0 || ptsV > 0 || golesL > 0 || golesV > 0) {
                            tabla[loc.nombre].pj++;
                            tabla[vis.nombre].pj++;
                            tabla[loc.nombre].gf += golesL;
                            tabla[loc.nombre].gc += golesV;
                            tabla[vis.nombre].gf += golesV;
                            tabla[vis.nombre].gc += golesL;
                            tabla[loc.nombre].pts += ptsL;
                            tabla[vis.nombre].pts += ptsV;

                            if (golesL > golesV) { tabla[loc.nombre].pg++; tabla[vis.nombre].pp++; }
                            else if (golesV > golesL) { tabla[vis.nombre].pg++; tabla[loc.nombre].pp++; }
                            else { tabla[loc.nombre].pe++; tabla[vis.nombre].pe++; }
                        }
                    }
                }
            });

            const ranking = Object.values(tabla).sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                return (b.gf - b.gc) - (a.gf - a.gc);
            });

            let html = "";
            ranking.forEach((eq, i) => {
                const dg = eq.gf - eq.gc;
                html += `
                    <tr>
                        <td>${i + 1}</td>
                        <td class="col-equipo">
                            <img src="${logos[eq.nombre] || ''}" class="mini-logo">
                            ${eq.nombre}
                        </td>
                        <td>${eq.pj}</td><td>${eq.pg}</td><td>${eq.pe}</td><td>${eq.pp}</td>
                        <td>${eq.gf}</td><td>${eq.gc}</td>
                        <td style="color:${dg > 0 ? 'green' : (dg < 0 ? 'red' : 'black')}">${dg > 0 ? '+' + dg : dg}</td>
                        <td class="pts-badge">${eq.pts}</td>
                    </tr>`;
            });
            document.getElementById('cuerpo-tabla').innerHTML = html;
        }

        function verFase(key) {
            faseActiva = key;
            const fase = ESTRUCTURA_FASES[key], res = DATA.config?.resultados || {}, logos = DATA.config?.logos || {}, equiposArr = Object.keys(logos);
            document.getElementById('menu-fases').style.display = 'none';
            document.getElementById('vista-partidos').style.display = 'block';
            let html = '';
            fase.ids.forEach(id => {
                const d = res[id];
                html += `<div class="card"><div class="sub-header">${id.replace(/-/g, ' ').toUpperCase()}</div>${renderGameUI(id, d, logos, equiposArr)}</div>`;
            });
            document.getElementById('render-partidos-fase').innerHTML = html;
        }

        function renderGameUI(id, d, logos, equiposArr) {
            const locNombre = d?.equipos?.local?.nombre || "", visNombre = d?.equipos?.visitante?.nombre || "";
            const attr = esAdmin ? "" : "readonly disabled";
            const btnVisible = esAdmin ? "block" : "none";
            return `
            <div class="game-meta">
                <div class="meta-row">
                    <input type="text" class="input-pill" id="d-${id}" value="${d?.fecha || ''}" ${attr}>
                    <input type="text" class="input-pill" id="h-${id}" value="${d?.hora || ''}" ${attr}>
                </div>
                <input type="text" class="input-sede" id="s-${id}" value="${d?.sede || ''}" ${attr}>
            </div>
            <div class="score-display">
                <div class="team-block">
                    <div class="logo-circle"><img src="${logos[locNombre] || ''}"></div>
                    <select class="select-equipo" id="l-${id}" ${attr}>
                        ${equiposArr.map(e => `<option value="${e}" ${e === locNombre ? 'selected' : ''}>${e}</option>`).join('')}
                    </select>
                </div>
                <div class="marcador-area">
                    <input type="number" class="input-goles" id="gl-${id}" value="${d?.equipos?.local?.goles || 0}" ${attr}>
                    <span>-</span>
                    <input type="number" class="input-goles" id="gv-${id}" value="${d?.equipos?.visitante?.goles || 0}" ${attr}>
                </div>
                <div class="team-block">
                    <div class="logo-circle"><img src="${logos[visNombre] || ''}"></div>
                    <select class="select-equipo" id="v-${id}" ${attr}>
                        ${equiposArr.map(e => `<option value="${e}" ${e === visNombre ? 'selected' : ''}>${e}</option>`).join('')}
                    </select>
                </div>
            </div>
            <button class="btn-update" style="display:${btnVisible}" onclick="guardarPartido('${id}')">ACTUALIZAR</button>`;
        }

        function guardarPartido(id) {
            if (!esAdmin) return;
            const updates = {};
            updates[`config/resultados/${id}/fecha`] = document.getElementById(`d-${id}`).value;
            updates[`config/resultados/${id}/hora`] = document.getElementById(`h-${id}`).value;
            updates[`config/resultados/${id}/equipos/local/goles`] = parseInt(document.getElementById(`gl-${id}`).value) || 0;
            updates[`config/resultados/${id}/equipos/visitante/goles`] = parseInt(document.getElementById(`gv-${id}`).value) || 0;
            db.ref().update(updates).then(() => alert("Guardado"));
        }

        function volverAlMenu() {
            faseActiva = null;
            document.getElementById('menu-fases').style.display = 'flex';
            document.getElementById('vista-partidos').style.display = 'none';
        }

        const ESTRUCTURA_FASES = {
            regular: { ids: ['ronda1-fecha1A', 'ronda1-fecha1B', 'ronda1-fecha2A', 'ronda1-fecha2B', 'ronda1-fecha3A', 'ronda1-fecha3B', 'ronda2-fecha1A', 'ronda2-fecha1B', 'ronda2-fecha2A', 'ronda2-fecha2B', 'ronda2-fecha3A', 'ronda2-fecha3B', 'ronda3-fecha1A', 'ronda3-fecha1B', 'ronda3-fecha2A', 'ronda3-fecha2B', 'ronda3-fecha3A', 'ronda3-fecha3B'] },
            playoffs: { ids: ['juego1-semifinalA', 'juego1-semifinalB', 'juego2-semifinalA', 'juego2-semifinalB', 'juego3-semifinalA', 'juego3-semifinalB'] },
            final: { ids: ['juego1-3puesto', 'juego1-granfinal', 'juego2-3puesto', 'juego2-granfinal', 'juego3-3puesto', 'juego3-granfinal'] }
        };
    </script>
</body>
</html>
